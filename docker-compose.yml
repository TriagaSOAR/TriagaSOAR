services:
  # ── Local mode: Ollama on GPU ──────────────────────────────────────────
  ollama:
    profiles: [local]
    image: ollama/ollama
    container_name: ollama
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ── soc-agent (both modes) ────────────────────────────────────────────
  soc-agent-local:
    profiles: [local]
    build: ./soc-agent
    container_name: soc-agent
    network_mode: host
    environment:
      - LLM_MODE=local
      - OLLAMA_HOST=http://localhost:11434
      - REASONER_MODEL=${REASONER_MODEL:-qwen3:14b}
      - ROUTER_MODEL=${ROUTER_MODEL:-qwen3:1.7b}
      - SPLUNK_HOST=${SPLUNK_HOST}
      - SPLUNK_PORT=${SPLUNK_PORT:-8089}
      - SPLUNK_TOKEN=${SPLUNK_TOKEN}
      - SPLUNK_WRITE_TOKEN=${SPLUNK_WRITE_TOKEN:-}
      - SPLUNK_VERIFY_SSL=${SPLUNK_VERIFY_SSL:-false}
      - DB_PATH=${DB_PATH:-/app/data/cases.db}
      - MONITOR_ENABLED=${MONITOR_ENABLED:-false}
      - MONITOR_INTERVAL_SECONDS=${MONITOR_INTERVAL_SECONDS:-60}
      - MONITOR_COOLDOWN_MINUTES=${MONITOR_COOLDOWN_MINUTES:-5}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-}
    volumes:
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  soc-agent-cloud:
    profiles: [cloud]
    build: ./soc-agent
    container_name: soc-agent
    network_mode: host
    environment:
      - LLM_MODE=cloud
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-openai}
      - CLOUD_MODEL=${CLOUD_MODEL:-gpt-4o}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SPLUNK_HOST=${SPLUNK_HOST}
      - SPLUNK_PORT=${SPLUNK_PORT:-8089}
      - SPLUNK_TOKEN=${SPLUNK_TOKEN}
      - SPLUNK_WRITE_TOKEN=${SPLUNK_WRITE_TOKEN:-}
      - SPLUNK_VERIFY_SSL=${SPLUNK_VERIFY_SSL:-false}
      - DB_PATH=${DB_PATH:-/app/data/cases.db}
      - MONITOR_ENABLED=${MONITOR_ENABLED:-false}
      - MONITOR_INTERVAL_SECONDS=${MONITOR_INTERVAL_SECONDS:-60}
      - MONITOR_COOLDOWN_MINUTES=${MONITOR_COOLDOWN_MINUTES:-5}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── web-backend (both modes) ──────────────────────────────────────────
  web-backend:
    profiles: [local, cloud]
    build: ./web-backend
    container_name: web-backend
    network_mode: host
    environment:
      - SOC_AGENT_URL=http://localhost:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── web-frontend (both modes) ─────────────────────────────────────────
  web-frontend:
    profiles: [local, cloud]
    build:
      context: ./web-frontend
      args:
        PUBLIC_API_URL: http://localhost:3000
    container_name: web-frontend
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ollama_data: