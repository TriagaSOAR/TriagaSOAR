services:
  # ── Local mode: Ollama on GPU ──────────────────────────────────────────
  ollama:
    profiles: [local]
    image: ollama/ollama
    container_name: ollama
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ── soc-agent (both modes) ────────────────────────────────────────────
  soc-agent-local:
    profiles: [local]
    build: ./soc-agent
    container_name: soc-agent
    network_mode: host
    environment:
      - LLM_MODE=local
      - OLLAMA_HOST=http://localhost:11434
      - REASONER_MODEL=${REASONER_MODEL:-qwen3:14b}
      - ROUTER_MODEL=${ROUTER_MODEL:-qwen3:1.7b}
      - SPLUNK_HOST=${SPLUNK_HOST}
      - SPLUNK_PORT=${SPLUNK_PORT:-8089}
      - SPLUNK_TOKEN=${SPLUNK_TOKEN}
      - SPLUNK_WRITE_TOKEN=${SPLUNK_WRITE_TOKEN:-}
      - SPLUNK_VERIFY_SSL=${SPLUNK_VERIFY_SSL:-false}
      - DB_PATH=${DB_PATH:-/app/data/cases.db}
      - MAESTER_OUTPUT_DIR=/app/data/maester
      - MONITOR_ENABLED=${MONITOR_ENABLED:-false}
      - MONITOR_INTERVAL_SECONDS=${MONITOR_INTERVAL_SECONDS:-60}
      - MONITOR_COOLDOWN_MINUTES=${MONITOR_COOLDOWN_MINUTES:-5}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-}
      - OKTA_DOMAIN=${OKTA_DOMAIN:-}
      - OKTA_API_TOKEN=${OKTA_API_TOKEN:-}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - SCUBAGEAR_OUTPUT_DIR=/app/data/scubagear
      - PLAYBOOKS_DIR=/app/playbooks
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
    volumes:
      - ./data:/app/data
      - ./soc-agent/playbooks:/app/playbooks:ro
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  soc-agent-cloud:
    profiles: [cloud]
    build: ./soc-agent
    container_name: soc-agent
    network_mode: host
    environment:
      - LLM_MODE=cloud
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-openai}
      - CLOUD_MODEL=${CLOUD_MODEL:-gpt-4o}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SPLUNK_HOST=${SPLUNK_HOST}
      - SPLUNK_PORT=${SPLUNK_PORT:-8089}
      - SPLUNK_TOKEN=${SPLUNK_TOKEN}
      - SPLUNK_WRITE_TOKEN=${SPLUNK_WRITE_TOKEN:-}
      - SPLUNK_VERIFY_SSL=${SPLUNK_VERIFY_SSL:-false}
      - DB_PATH=${DB_PATH:-/app/data/cases.db}
      - MAESTER_OUTPUT_DIR=/app/data/maester
      - SCUBAGEAR_OUTPUT_DIR=/app/data/scubagear
      - MONITOR_ENABLED=${MONITOR_ENABLED:-false}
      - MONITOR_INTERVAL_SECONDS=${MONITOR_INTERVAL_SECONDS:-60}
      - MONITOR_COOLDOWN_MINUTES=${MONITOR_COOLDOWN_MINUTES:-5}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-}
      - OKTA_DOMAIN=${OKTA_DOMAIN:-}
      - OKTA_API_TOKEN=${OKTA_API_TOKEN:-}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - PLAYBOOKS_DIR=/app/playbooks
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
    volumes:
      - ./data:/app/data
      - ./soc-agent/playbooks:/app/playbooks:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── web-backend (both modes) ──────────────────────────────────────────
  web-backend:
    profiles: [local, cloud]
    build: ./web-backend
    container_name: web-backend
    network_mode: host
    environment:
      - SOC_AGENT_URL=http://localhost:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── web-frontend (both modes) ─────────────────────────────────────────
  web-frontend:
    profiles: [local, cloud]
    build:
      context: ./web-frontend
      args:
        PUBLIC_API_URL: http://localhost:3000
    container_name: web-frontend
    network_mode: host
    environment:
      - AUTH_SERVICE_URL=http://localhost:4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Maester (optional — Microsoft 365 security checks) ────────────────
  maester:
    profiles: [maester]
    build: ./integrations/maester
    container_name: maester
    network_mode: host
    environment:
      - MAESTER_TENANT_ID=${MAESTER_TENANT_ID:-}
      - MAESTER_CLIENT_ID=${MAESTER_CLIENT_ID:-}
      - MAESTER_CLIENT_SECRET=${MAESTER_CLIENT_SECRET:-}
      - MAESTER_INTERVAL_MINUTES=${MAESTER_INTERVAL_MINUTES:-60}
      - MAESTER_OUTPUT_DIR=/app/output
    volumes:
      - ./data/maester:/app/output
    restart: unless-stopped

  # ── ScubaGear (optional — CISA SCuBA M365 baseline checks) ───────────
  scubagear:
    profiles: [scubagear]
    build: ./integrations/scubagear
    container_name: scubagear
    network_mode: host
    environment:
      - SCUBAGEAR_TENANT_ID=${SCUBAGEAR_TENANT_ID:-}
      - SCUBAGEAR_CLIENT_ID=${SCUBAGEAR_CLIENT_ID:-}
      - SCUBAGEAR_CERT_THUMBPRINT=${SCUBAGEAR_CERT_THUMBPRINT:-}
      - SCUBAGEAR_ORGANIZATION=${SCUBAGEAR_ORGANIZATION:-}
      - SCUBAGEAR_INTERVAL_MINUTES=${SCUBAGEAR_INTERVAL_MINUTES:-60}
      - SCUBAGEAR_OUTPUT_DIR=/app/output
    volumes:
      - ./data/scubagear:/app/output
      - ./integrations/scubagear/certs:/app/certs:ro
    restart: unless-stopped

  # ── Postgres (session store + audit log) ──────────────────────────────
  postgres:
    build: ./postgres
    container_name: postgres
    network_mode: host
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-soc_triage}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AUTH_APP_PASSWORD=${AUTH_APP_PASSWORD}
      - AUDIT_WRITER_PASSWORD=${AUDIT_WRITER_PASSWORD}
      - AUDIT_READER_PASSWORD=${AUDIT_READER_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth proxy (Axum, sits in front of everything) ────────────────────
  auth:
    profiles: [local, cloud]
    build: ./auth
    container_name: auth
    network_mode: host
    secrets:
      - admin_password
      - session_secret
    environment:
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-soc_triage}
      - AUTH_APP_PASSWORD=${AUTH_APP_PASSWORD}
      - AUDIT_WRITER_PASSWORD=${AUDIT_WRITER_PASSWORD}
      - BACKEND_URL=http://localhost:3000
      - AGENT_URL=http://localhost:8000
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - IP_ALLOWLIST=${IP_ALLOWLIST:-}
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/auth/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ollama_data:
  postgres_data:

secrets:
  admin_password:
    file: ./secrets/admin_password.txt
  session_secret:
    file: ./secrets/session_secret.txt