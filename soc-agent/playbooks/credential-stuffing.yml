id: credential-stuffing-response
name: Credential Stuffing Auto-Response
enabled: true
description: >
  Automatically revoke sessions and notify when credential stuffing
  is detected with high confidence.

conditions:
  confidence_gte: 0.80
  techniques_include:
    - T1110.004
  severity_in:
    - high
    - critical

actions:
  - type: entra_revoke_sessions
    target: "{{affected_user}}"

  - type: okta_clear_sessions
    target: "{{affected_user}}"

  - type: teams
    title: "TriagaSOAR: Credential Stuffing Detected"
    message: "{{summary}}"

  - type: splunk_saved_search
    name: "Auto-Hunt: Credential Stuffing {{affected_user}}"
    spl: 'index=main "Failed password" | stats count by src_ip, user | where count > 5 | sort -count'